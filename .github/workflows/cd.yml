# CD: build image, push to ECR, then deploy to EC2. Runs after CI succeeds on main/master or on release.
name: CD

on:
  workflow_run: # This should run when the CI workflow completes. (Completed- Either successfully or unsuccessfully)
    workflows: ["CI"]
    types: [completed]
    branches: [main, master]
  release: # This should run when a release is published.
    types: [published]

env:
  ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}
  ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
  AWS_REGION: ${{ secrets.AWS_REGION }}

jobs:
  build-and-push: # JOB 1 : Build and push the image to Amazon ECR
    runs-on: ubuntu-latest
    if: > # This should only run if the event is a release or the CI workflow completed successfully.
      (github.event_name == 'release') ||
      (github.event_name == 'workflow_run' &&
       github.event.workflow_run.conclusion == 'success' &&
       (github.event.workflow_run.head_branch == 'main' ||
        github.event.workflow_run.head_branch == 'master'))
    permissions:
      contents: read
      id-token: write

    steps: # Job 1
      - name: Checkout # Task1 (checkout the commit that passed CI, checkout the commit tied to the release)
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

      - name: Configure AWS credentials # Task2 (configure AWS credentials)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Log in to Amazon ECR # Task3 (log in to Amazon ECR)
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image # Task4 (build and push the image to Amazon ECR)
        id: build
        # 1. If this workflow was triggered by a release, use the release version name as the tag, Otherwise, use the commit ID as the tag.
        # 2. Set the image name. 123456789012.dkr.ecr.us-east-1.amazonaws.com/multi-agent-analyst
        # 3. Build the image with the tag.
        # 4. Push the image to Amazon ECR.
        # 5. Output the tag to the GitHub Actions output. eg : steps.<step_id>.outputs.tag = v2.1.0
        run: |
          TAG=${{ github.event_name == 'release' && github.event.release.tag_name || github.sha }}
          IMAGE=${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}
          docker build -t "$IMAGE:$TAG" .
          docker push "$IMAGE:$TAG"
          echo "tag=$TAG" >> $GITHUB_OUTPUT

    outputs:
      image_tag: ${{ steps.build.outputs.tag }}

  deploy-to-ec2: # JOB 2 (Deploy the ECR Image to EC2)
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: SSH to EC2, pull image and run container # Task1 (SSH to EC2, pull image and run container)
        uses: appleboy/ssh-action@v1.0.3 # Connect to a remote server (like EC2) using SSH
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_SSH_USER }}
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          # 1. set -e : Exit the script if any command fails
          # 2. IMAGE : The image to pull from ECR eg : 123456789012.dkr.ecr.us-east-1.amazonaws.com/multi-agent-analyst:v2.1.0
          # 3. Log in to ECR : AWS gives a temporary ECR Login password, the docker inside EC2 can use this password to login to ECR.
          # 4. docker pull "$IMAGE" : Pull the image from ECR
          # 5. docker stop multi-agent-analyst 2>/dev/null || true : If the container already present, Stop the container if running.
          # 6. docker rm multi-agent-analyst 2>/dev/null || true : Remove that existing container.
          # 7. Run the new container with the image.
          script: |
            set -e

            sudo dnf update -y
            sudo dnf install -y docker
            sudo systemctl start docker
            sudo systemctl enable docker
            sudo usermod -aG docker ec2-user

            REGION=$(echo "${{ secrets.AWS_REGION }}" | tr -d '\n\r')
            SECRET_ARN=$(echo "${{ secrets.MULTI_AGENT_SECRET_ARN }}" | tr -d '\n\r')
            IMAGE="${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ needs.build-and-push.outputs.image_tag }}"
            aws ecr get-login-password --region "$REGION" | docker login --username AWS --password-stdin ${{ env.ECR_REGISTRY }}
            docker pull "$IMAGE"
            docker stop multi-agent-analyst 2>/dev/null || true
            docker rm multi-agent-analyst 2>/dev/null || true
            docker run -d --name multi-agent-analyst --restart unless-stopped -p 8000:8000 \
              -e MULTI_AGENT_SECRET_ARN="$SECRET_ARN" \
              -e AWS_REGION="$REGION" \
              "$IMAGE"
